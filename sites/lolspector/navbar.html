<style>
  .navbar {
    height: 100%;
    width: 5em;

    background-color: #1B263B;
    color: #E0E1DD;

    display: flex;
    flex-direction: column;

    justify-content: flex-start;
    align-content: flex-start;

    justify-items: center;
    align-items: center;
  }

  .navbar .nav-item {
    background-color: #415A77;
    border-radius: 15px;

    height: 4em;
    width: 4em;

    display: flex;
    flex-direction: column;

    vertical-align: middle;
    justify-content: center;
    align-content: center;

    align-items: center;
    justify-items: center;

    text-align: center;
    user-select: none;

    margin-top: 1em;

    transition: all 50ms ease-in;
  }

  .navbar .nav-item:hover {
    background-color: #E0E1DD;
    color: #778DA9;
  }

  .navbar .nav-item img {
    height: 75%;
    width: 75%;
  }
</style>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('navbar', () => {
      onRouteClick(route) {
        this.$store.current_route = `${route}.html`;
      }
    }) 
  });

  
</script>

<div class="navbar">
  <div class="nav-item" @click="$store.current_route = 'clash.html'">
    <img src="calendar.png"/>
  </div>
  <div class="nav-item" @click="$store.current_route = 'profile.html'">
    <img src="user.png"/>
  </div>
  <div class="nav-item">
    <img src="history.png"/>
  </div>
  <div class="nav-item">
    <img src="exit.png"/>
  </div>
</div>
